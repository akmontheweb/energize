apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: energize
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: energize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: identity
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.4
          imagePullPolicy: IfNotPresent
          args: ["start", "--optimized"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres.energize.svc.cluster.local:5432/energize
            - name: KC_DB_USERNAME
              value: energize
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: energize-secrets
                  key: POSTGRES_PASSWORD
            - name: KC_HOSTNAME
              value: coaching.energize.com
            - name: KC_HOSTNAME_PATH
              value: /auth
            - name: KC_HTTP_RELATIVE_PATH
              value: /auth
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY
              value: edge
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: energize-secrets
                  key: KEYCLOAK_CLIENT_SECRET
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /auth/health/started
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
