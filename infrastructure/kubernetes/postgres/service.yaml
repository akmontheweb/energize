apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: energize
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: energize
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet DNS
