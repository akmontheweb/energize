<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 46" fill="none">
  <!-- Curved swoosh arc -->
  <path d="M6 40 Q10 24 24 15" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Sun / small burst at base -->
  <circle cx="8" cy="38" r="3.5" fill="#7dd3fc"/>
  <line x1="8" y1="33" x2="8" y2="31.5" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="3" y1="38" x2="1.5" y2="38" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="4.5" y1="34.5" x2="3.4" y2="33.4" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="11.5" y1="34.5" x2="12.6" y2="33.4" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Person head -->
  <circle cx="21" cy="16" r="3.8" fill="white"/>

  <!-- Person arms outstretched -->
  <path d="M13 21 L21 23.5 L29 21" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow shaft going up-right -->
  <path d="M25 19 L37 6" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow head -->
  <path d="M37 6 L31.5 7.5" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
  <path d="M37 6 L35.5 11.5" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>

  <!-- 4-pointed star at arrow tip -->
  <path d="M38.5 3.5 L39.8 6.8 L43.2 8 L39.8 9.2 L38.5 12.5 L37.2 9.2 L33.8 8 L37.2 6.8 Z" fill="white"/>

  <!-- ENERGIZE wordmark -->
  <text x="52" y="26" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="0.8">ENERGIZE</text>

  <!-- PROFESSIONAL COACHING subtitle -->
  <text x="53" y="39" font-family="Arial, sans-serif" font-size="7.5" font-weight="500" fill="#94a3b8" letter-spacing="2.2">PROFESSIONAL COACHING</text>
</svg>
